<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1B2D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2E4A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="200" rx="20" fill="url(#bgGrad)"/>

  <!-- Sun/Day icon -->
  <!-- Center circle -->
  <circle cx="80" cy="100" r="28" fill="url(#sunGrad)"/>

  <!-- Sun rays -->
  <line x1="80" y1="55" x2="80" y2="45" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="145" x2="80" y2="155" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="35" y1="100" x2="25" y2="100" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="125" y1="100" x2="135" y2="100" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="68" x2="41" y2="61" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="132" x2="119" y2="139" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="68" x2="119" y2="61" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
  <line x1="48" y1="132" x2="41" y2="139" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>

  <!-- Checkmark inside sun -->
  <polyline points="68,100 77,110 95,90" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- DayWise text -->
  <text x="160" y="88" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="url(#textGrad)">Day</text>
  <text x="160" y="145" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#FF6B35">Wise</text>

  <!-- Tagline -->
  <text x="162" y="168" font-family="Georgia, serif" font-size="13" fill="#7A9BB5" letter-spacing="2">YOUR DAILY LIFE COMPANION</text>
</svg>
